version: '3.8'
services:
  db:
    image: postgres:16-alpine
    container_name: fincheck-db
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: fincheck
    volumes:
      - fincheck-data:/var/lib/postgresql/data

volumes:
  fincheck-data:
